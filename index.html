<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>呼吸・對位｜瑜伽與底妝的減法對談</title>
  <style>
    :root {
      --bg: #f6f0e8;
      --card: #fffaf3;
      --deep: #5b4733;
      --mid: #8a7158;
      --soft: #d8c8b7;
      --accent: #9a7a55;
      --text: #3f352b;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Serif TC", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", serif;
      background: linear-gradient(180deg, #f8f3ec 0%, #efe4d8 100%);
      color: var(--text);
      line-height: 1.8;
    }

    .page {
      width: 100%;
      overflow: hidden;
    }

    .hero {
      padding: 72px 20px 56px;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,.9), transparent 28%),
        linear-gradient(135deg, #f8f1e8 0%, #efe1d2 100%);
      text-align: center;
      position: relative;
    }

    .eyebrow {
      color: var(--mid);
      letter-spacing: 4px;
      font-size: 15px;
      margin-bottom: 14px;
      font-weight: 600;
    }

    h1 {
      margin: 0 auto;
      max-width: 900px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.22;
      color: var(--deep);
      letter-spacing: 1px;
    }

    .subtitle {
      max-width: 760px;
      margin: 24px auto 0;
      font-size: clamp(18px, 2vw, 24px);
      color: #594838;
    }

    .hero-note {
      margin: 30px auto 0;
      max-width: 620px;
      padding: 18px 24px;
      border-top: 1px solid var(--soft);
      border-bottom: 1px solid var(--soft);
      color: #5b4a3b;
      font-size: 18px;
    }

    .cta-row {
      margin-top: 34px;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 14px 30px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 1px;
      transition: .2s ease;
    }
